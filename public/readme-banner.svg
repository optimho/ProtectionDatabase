<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">ProtectionDatabase banner using repository logo</title>
  <desc id="desc">Banner for ProtectionDatabase styled to match the application UI and using the repository logo asset prominently.</desc>

  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>

    <linearGradient id="sidebarBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="24" fill="url(#pageBg)"/>

  <!-- Outer shell -->
  <rect x="28" y="24" width="1144" height="272" rx="24" fill="#f1f5f9" stroke="#cbd5e1"/>

  <!-- Sidebar -->
  <rect x="28" y="24" width="236" height="272" rx="24" fill="url(#sidebarBg)"/>
  <path d="M264 24 L264 296" stroke="#334155"/>

  <!-- Logo card -->
  <g filter="url(#cardShadow)">
    <rect x="52" y="48" width="188" height="92" rx="14" fill="#ffffff"/>
  </g>
  <image href="/logo.jpg" x="68" y="62" width="156" height="50" preserveAspectRatio="xMidYMid meet"/>
  <text x="56" y="160" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="1.6">
    PROTECTION DEVICE DATABASE
  </text>

  <!-- Sidebar nav -->
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="48" y="184" width="196" height="36" rx="8" fill="#334155"/>
    <text x="68" y="207" fill="#ffffff" font-size="14" font-weight="700">Dashboard</text>

    <text x="68" y="241" fill="#cbd5e1" font-size="14">Analytics</text>
    <text x="68" y="267" fill="#cbd5e1" font-size="14">Reports</text>
  </g>

  <!-- Main content -->
  <g transform="translate(298 56)" font-family="Arial, Helvetica, sans-serif">
    <text x="0" y="0" fill="#0f172a" font-size="44" font-weight="700">ProtectionDatabase</text>
    <text x="0" y="34" fill="#475569" font-size="18">
      Maintenance records, relay settings, manuals, reports, and protection history together.
    </text>

    <!-- top pills -->
    <g transform="translate(0 56)">
      <rect x="0" y="0" width="132" height="38" rx="10" fill="#2563eb"/>
      <text x="66" y="24" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Dashboard</text>

      <rect x="144" y="0" width="112" height="38" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="200" y="24" text-anchor="middle" fill="#334155" font-size="14" font-weight="700">Devices</text>

      <rect x="268" y="0" width="138" height="38" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="337" y="24" text-anchor="middle" fill="#334155" font-size="14" font-weight="700">Maintenance</text>

      <rect x="418" y="0" width="106" height="38" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="471" y="24" text-anchor="middle" fill="#334155" font-size="14" font-weight="700">Reports</text>
    </g>

    <!-- content cards -->
    <g transform="translate(0 118)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="248" height="104" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="18" y="24" fill="#64748b" font-size="12" font-weight="700">RELAY HEALTH</text>
      <circle cx="28" cy="50" r="6" fill="#16a34a"/>
      <text x="42" y="55" fill="#0f172a" font-size="14">Protection reports current</text>
      <circle cx="28" cy="76" r="6" fill="#2563eb"/>
      <text x="42" y="81" fill="#0f172a" font-size="14">Settings linked to devices</text>

      <rect x="266" y="0" width="248" height="104" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="284" y="24" fill="#64748b" font-size="12" font-weight="700">ASSET TRACKING</text>
      <text x="284" y="66" fill="#0f172a" font-size="34" font-weight="700">248</text>
      <rect x="284" y="78" width="126" height="8" rx="4" fill="#dbeafe"/>
      <rect x="284" y="78" width="92" height="8" rx="4" fill="#2563eb"/>

      <rect x="532" y="0" width="286" height="104" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="550" y="24" fill="#64748b" font-size="12" font-weight="700">WORKFLOW</text>
      <rect x="550" y="42" width="72" height="34" rx="8" fill="#eff6ff"/>
      <text x="586" y="63" text-anchor="middle" fill="#2563eb" font-size="13" font-weight="700">Manuals</text>

      <rect x="632" y="42" width="72" height="34" rx="8" fill="#eff6ff"/>
      <text x="668" y="63" text-anchor="middle" fill="#2563eb" font-size="13" font-weight="700">Settings</text>

      <rect x="714" y="42" width="86" height="34" rx="8" fill="#dbeafe"/>
      <text x="757" y="63" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="700">Reports</text>
    </g>
  </g>

  <!-- accent line -->
  <rect x="298" y="270" width="380" height="4" rx="2" fill="#2563eb"/>
</svg>
