<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">ProtectionDatabase industrial banner</title>
  <desc id="desc">Industrial-styled banner for the ProtectionDatabase repository featuring switchgear, relay panels, and power system motifs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="55%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="50%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#334155" stroke-width="1" opacity="0.35" />
    </pattern>
  </defs>

  <rect width="1200" height="320" rx="24" fill="url(#bg)" />
  <rect width="1200" height="320" rx="24" fill="url(#grid)" />

  <g opacity="0.18">
    <circle cx="1030" cy="72" r="120" fill="#38bdf8" />
    <circle cx="1125" cy="248" r="140" fill="#f59e0b" />
  </g>

  <g transform="translate(70 52)">
    <rect x="0" y="0" width="160" height="216" rx="16" fill="#0f172a" stroke="url(#steel)" stroke-width="3" />
    <rect x="18" y="18" width="124" height="180" rx="10" fill="#111827" stroke="#64748b" stroke-width="2" />
    <rect x="34" y="34" width="92" height="20" rx="6" fill="#1e293b" />
    <text x="80" y="49" text-anchor="middle" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700">RELAY PANEL</text>

    <circle cx="54" cy="84" r="8" fill="#22c55e" />
    <circle cx="80" cy="84" r="8" fill="#f59e0b" />
    <circle cx="106" cy="84" r="8" fill="#38bdf8" />

    <rect x="38" y="106" width="84" height="44" rx="8" fill="#020617" stroke="#38bdf8" stroke-width="2" />
    <path d="M48 129 H70 L78 119 L88 137 L98 123 L112 123" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

    <g stroke="#94a3b8" stroke-width="3" stroke-linecap="round">
      <path d="M46 168 V188" />
      <path d="M64 168 V194" />
      <path d="M82 168 V186" />
      <path d="M100 168 V192" />
      <path d="M118 168 V188" />
    </g>
  </g>

  <g transform="translate(270 78)">
    <text x="0" y="0" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="52" font-weight="800">
      ProtectionDatabase
    </text>
    <text x="0" y="46" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="500">
      Industrial protection records for relays, maintenance, reports, and field history.
    </text>

    <g transform="translate(0 92)">
      <rect x="0" y="0" width="204" height="44" rx="22" fill="#111827" stroke="#475569" />
      <path d="M22 28 H42 L50 16 L60 34 L70 22 L88 22" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      <text x="102" y="28" text-anchor="middle" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">Relay settings</text>

      <rect x="220" y="0" width="228" height="44" rx="22" fill="#111827" stroke="#475569" />
      <g transform="translate(240 12)">
        <rect x="0" y="0" width="18" height="20" rx="3" fill="none" stroke="#38bdf8" stroke-width="2" />
        <path d="M5 6 H13 M5 10 H13 M5 14 H10" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" />
      </g>
      <text x="334" y="28" text-anchor="middle" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">Maintenance journals</text>

      <rect x="464" y="0" width="214" height="44" rx="22" fill="#111827" stroke="#475569" />
      <g transform="translate(486 12)">
        <circle cx="10" cy="10" r="9" fill="none" stroke="#22c55e" stroke-width="2" />
        <path d="M10 4 V10 L15 13" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
      </g>
      <text x="574" y="28" text-anchor="middle" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">Service history</text>
    </g>
  </g>

  <g transform="translate(930 84)">
    <rect x="0" y="0" width="190" height="160" rx="18" fill="#0f172a" stroke="#64748b" stroke-width="2.5" />
    <rect x="18" y="18" width="154" height="26" rx="6" fill="#1e293b" />
    <text x="95" y="36" text-anchor="middle" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700">SWITCHGEAR STATUS</text>

    <g transform="translate(24 62)">
      <rect x="0" y="0" width="44" height="72" rx="8" fill="#111827" stroke="#475569" />
      <circle cx="22" cy="20" r="8" fill="#22c55e" />
      <rect x="12" y="38" width="20" height="18" rx="4" fill="#334155" />

      <rect x="54" y="0" width="44" height="72" rx="8" fill="#111827" stroke="#475569" />
      <circle cx="76" cy="20" r="8" fill="#f59e0b" />
      <rect x="66" y="38" width="20" height="18" rx="4" fill="#334155" />

      <rect x="108" y="0" width="44" height="72" rx="8" fill="#111827" stroke="#475569" />
      <circle cx="130" cy="20" r="8" fill="#38bdf8" />
      <rect x="120" y="38" width="20" height="18" rx="4" fill="#334155" />
    </g>
  </g>

  <rect x="270" y="258" width="460" height="6" rx="3" fill="url(#accent)" opacity="0.95" />
</svg>
